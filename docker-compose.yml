version: '3.8'

services:
  redis:
    image: redis:6.2
    container_name: redis_container
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  database:
    image: postgres:17.4
    container_name: database
    restart: always
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    container_name: backend
    build:
      context: .
    volumes:
      - ./configs:/app/configs 
    ports:
      - 8000:8000
    restart: always
    depends_on:
      - database
    environment:
      ENV_PATH: ./configs/backend/dev.env
      DATABASE_HOST: database
      CACHE_HOST: redis

  db-migrations:
    image: node:22-alpine
    container_name: db-migrations
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm run migration:dev up"
    depends_on:
      - database
    environment:
      DATABASE_HOST: database

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    volumes:
      - ./configs/prometheus/dev.prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    volumes:
      - ./configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - '3000:3000'

volumes:
  redis_data:
  pgdata:
