name: Docker Build

on:
  push:
    branches:
      - master

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

      - name: Debug repository info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Repository Owner: ${{ github.repository_owner }}"
          echo "Actor: ${{ github.actor }}"
          echo "Token type: ${{ secrets.CR_PAT != '' && 'CR_PAT' || 'GITHUB_TOKEN' }}"

      - name: Check GHCR access
        run: |
          echo "Проверяем доступ к GHCR..."
          if [ -z "${{ secrets.CR_PAT }}" ]; then
            echo "⚠️ CR_PAT не настроен, используем GITHUB_TOKEN"
          else
            echo "✅ CR_PAT настроен"
          fi

      - name: Build Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.actor }}/task-tracker-backend
          echo "Собираем образ: $IMAGE_NAME"
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.actor }}/task-tracker-backend
          echo "Публикуем образ: $IMAGE_NAME"
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}

