name: Docker Build

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/backend
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/backend
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: build-docker
    if: success()
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Останавливаем текущий контейнер
            docker stop task-tracker-backend || true
            docker rm task-tracker-backend || true
            
            # Удаляем старый образ
            docker rmi ghcr.io/${{ github.repository_owner }}/backend:latest || true
            
            # Логинимся в GHCR
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Запускаем новый контейнер
            docker run -d \
              --name task-tracker-backend \
              --restart unless-stopped \
              -p 8000:3000 \
              -e NODE_ENV=production \
              -e SWAGGER_CONFIG_FILE_PATH=configs/backend/dev.swagger.config.yml \
              ghcr.io/${{ github.repository_owner }}/backend:latest
            
            # Ждем запуска приложения
            sleep 10
            
            # Проверяем логи
            docker logs task-tracker-backend
            
            # Проверяем, что приложение отвечает
            curl -f http://localhost:8000/swagger || echo "Swagger недоступен"
            
            # Очищаем неиспользуемые образы
            docker image prune -f
