name: Docker Build

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          echo "=== Начинаем сборку Docker образа ==="
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/backend
          echo "Имя образа: $IMAGE_NAME"
          echo "Тег: ${{ env.IMAGE_TAG }}"
          echo "Текущая директория: $(pwd)"
          echo "Содержимое директории:"
          ls -la
          echo "Собираем образ..."
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .
          echo "=== Сборка завершена ==="

      - name: Push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/backend
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: build-docker
    
    steps:
      - name: Test connection first
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Тест подключения в основном workflow ==="
            echo "Пользователь: $(whoami)"
            echo "Docker: $(docker --version)"
            echo "=== Тест завершен ==="
            
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Начинаем деплой через docker-compose ==="
            
            # Переходим в директорию проекта
            cd /root/task-tracker-backend || echo "Директория не найдена"
            
            # Обновляем код из репозитория
            echo "Обновляем код из репозитория..."
            if [ -d ".git" ]; then
              git pull origin master
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            # Логинимся в GHCR
            echo "Логинимся в GitHub Container Registry..."
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Останавливаем и запускаем контейнеры
            echo "Перезапускаем контейнеры..."
            docker-compose down
            docker-compose pull
            docker-compose up -d
            
            # Ждем запуска
            echo "Ждем запуска приложения..."
            sleep 15
            
            # Проверяем статус
            echo "Статус контейнеров:"
            docker-compose ps
            
            # Проверяем логи
            echo "Логи приложения:"
            docker-compose logs backend
            
            # Проверяем доступность
            echo "Проверяем Swagger..."
            curl -f http://localhost:8000/swagger || echo "Swagger недоступен"
            
            echo "=== Деплой завершен ==="
