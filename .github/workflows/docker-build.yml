name: Docker Build

on:
  push:
    branches:
      - master

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +%s)" >> $GITHUB_ENV

      - name: Debug repository info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Repository Owner: ${{ github.repository_owner }}"
          echo "Actor: ${{ github.actor }}"
          echo "Token type: ${{ secrets.CR_PAT != '' && 'CR_PAT' || 'GITHUB_TOKEN' }}"

      - name: Check GHCR access
        run: |
          echo "Проверяем доступ к GHCR..."
          if [ -z "${{ secrets.CR_PAT }}" ]; then
            echo "⚠️ CR_PAT не настроен, используем GITHUB_TOKEN"
          else
            echo "✅ CR_PAT настроен"
          fi

      - name: Build Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.actor }}/task-tracker-backend
          echo "Собираем образ: $IMAGE_NAME"
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: Push Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.actor }}/task-tracker-backend
          echo "Публикуем образ: $IMAGE_NAME"
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}

  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/master'
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== Начинаем деплой на продакшн ==="
            
            # Создаем директорию проекта
            PROJECT_DIR="/root/task-tracker-backend"
            echo "Рабочая директория: $PROJECT_DIR"
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            # Очищаем директорию
            echo "Очищаем рабочую директорию..."
            rm -rf * .*
            
            # Клонируем репозиторий
            echo "Клонируем репозиторий..."
            git clone https://github.com/${{ github.repository }}.git .
            
            # Создаем .env файл для продакшна
            echo "Создаем .env файл для продакшна..."
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            NODE_ENV=production
            GITHUB_REPOSITORY_OWNER=${{ github.actor }}
            EOF
            
            # Проверяем файлы
            echo "Проверяем структуру проекта..."
            ls -la
            echo "Docker файлы:"
            ls -la docker*
            
            # Создаем директории для nginx
            echo "Создаем директории для nginx..."
            mkdir -p nginx/ssl
            
            # Создаем самоподписанные SSL сертификаты (для тестирования)
            echo "Создаем SSL сертификаты..."
            openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout nginx/ssl/key.pem \
              -out nginx/ssl/cert.pem \
              -subj "/C=RU/ST=State/L=City/O=Organization/CN=localhost"
            
            # Логинимся в GHCR
            echo "Логинимся в GitHub Container Registry..."
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Останавливаем старые контейнеры
            echo "Останавливаем старые контейнеры..."
            docker-compose -f docker-compose.prod.yml down --remove-orphans || echo "Контейнеры не запущены"
            
            # Удаляем старые образы
            echo "Удаляем старые образы..."
            docker image prune -f
            
            # Запускаем новые контейнеры
            echo "Запускаем новые контейнеры..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Ждем запуска сервисов
            echo "Ждем запуска сервисов..."
            sleep 45
            
            # Проверяем статус контейнеров
            echo "Статус контейнеров:"
            docker-compose -f docker-compose.prod.yml ps
            
            # Проверяем логи backend
            echo "Логи backend сервиса:"
            docker-compose -f docker-compose.prod.yml logs --tail=50 backend
            
            # Проверяем доступность приложения
            echo "Проверяем доступность приложения..."
            for i in {1..5}; do
              if curl -f http://localhost:8000/health; then
                echo "Приложение успешно запущено!"
                break
              else
                echo "Попытка $i: приложение недоступно, ждем..."
                sleep 10
              fi
            done
            
            # Проверяем статус базы данных
            echo "Проверяем статус базы данных..."
            docker-compose -f docker-compose.prod.yml exec -T database pg_isready -U ${{ secrets.POSTGRES_USER }} || echo "База данных недоступна"
            
            # Проверяем Redis
            echo "Проверяем Redis..."
            docker-compose -f docker-compose.prod.yml exec -T redis redis-cli ping || echo "Redis недоступен"
            
            # Проверяем nginx
            echo "Проверяем nginx..."
            docker-compose -f docker-compose.prod.yml exec -T nginx nginx -t || echo "Nginx конфигурация некорректна"
            
            echo "=== Деплой завершен ==="

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-to-production
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Wait for deployment
        run: sleep 60
        
      - name: Check application health
        run: |
          echo "Проверяем доступность приложения..."
          for i in {1..10}; do
            if curl -f ${{ secrets.APP_URL }}/health; then
              echo "✅ Приложение доступно!"
              exit 0
            else
              echo "⏳ Попытка $i: приложение недоступно, ждем..."
              sleep 30
            fi
          done
          echo "❌ Приложение недоступно после всех попыток"
          exit 1

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-to-production, health-check]
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Deployment Summary
        run: |
          echo "🚀 Деплой завершен успешно!"
          echo "📦 Образ: ghcr.io/${{ github.actor }}/task-tracker-backend:latest"
          echo "🔗 URL: ${{ secrets.APP_URL }}"
          echo "📅 Время: $(date)"
          echo "✅ Все проверки пройдены"

