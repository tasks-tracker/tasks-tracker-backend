name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/backend
            
            # Создать/обновить docker-compose.yml
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              redis:
                image: redis:6.2
                container_name: redis
                restart: unless-stopped
                volumes:
                  - redis_data:/data
                command: ["redis-server", "--appendonly", "yes"]

              database:
                image: postgres:17.4
                container_name: database
                restart: unless-stopped
                environment:
                  POSTGRES_USER: username
                  POSTGRES_PASSWORD: password
                  POSTGRES_DB: database
                volumes:
                  - pgdata:/var/lib/postgresql/data

              zookeeper:
                image: confluentinc/cp-zookeeper:7.6.5
                container_name: zookeeper
                restart: unless-stopped
                environment:
                  ZOOKEEPER_CLIENT_PORT: 2181
                  ZOOKEEPER_TICK_TIME: 2000
                volumes:
                  - zookeeper_data:/var/lib/zookeeper/data
                  - zookeeper_logs:/var/lib/zookeeper/log

              kafka1:
                image: confluentinc/cp-kafka:7.6.5
                container_name: kafka1
                restart: unless-stopped
                depends_on:
                  - zookeeper
                ports:
                  - "9092:9092"
                environment:
                  KAFKA_BROKER_ID: 1
                  KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
                  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
                  KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092
                  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
                  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
                  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
                volumes:
                  - kafka1_data:/var/lib/kafka/data

              db-migrations:
                image: ghcr.io/${{ github.repository_owner }}/migration-backend:latest
                container_name: db-migrations
                volumes:
                  - ./configs:/app/configs
                depends_on:
                  - database
                environment:
                  - NODE_ENV=production
                  - DATABASE_HOST=database
                  - DATABASE_CONFIG_FILE_PATH=configs/database.config.yml
                restart: "no"

              backend:
                image: ghcr.io/${{ github.repository_owner }}/backend:latest
                container_name: backend
                restart: unless-stopped
                ports:
                  - "8000:8000"
                environment:
                  - NODE_ENV=production
                  - DATABASE_HOST=database
                  - CACHE_HOST=redis
                  - KAFKA_BROKERS=['kafka1:29092']
                volumes:
                  - ./configs:/app/configs
                depends_on:
                  - database
                  - redis
                  - kafka1
                  - db-migrations

            volumes:
              redis_data:
              pgdata:
              zookeeper_data:
              zookeeper_logs:
              kafka1_data:
            EOF
            
            # Создать production конфиги
            rm -rf configs
            mkdir -p configs
            
            # Kafka конфиг
            cat > configs/kafka.config.yml << 'EOF'
            clientId: 'backend-prod'
            brokers: ['kafka1:29092']
            groupId: 'backend-group'
            sessionTimeout: 30000
            heartbeatInterval: 3000
            retry: {
              initialRetryTime: 100,
              retries: 8
            }
            ssl: false
            sasl: false
            EOF
            
            # CORS конфиг
            cat > configs/cors.config.yml << 'EOF'
            origin: 
              - 'http://138.124.16.107:4200'
              - 'http://138.124.16.107:3000'
              - 'http://138.124.16.107'
            methods: 
              - 'GET'
              - 'POST'
              - 'PUT'
              - 'DELETE'
              - 'PATCH'
              - 'OPTIONS'
            allowedHeaders:
              - 'Content-Type'
              - 'Authorization'
              - 'X-Requested-With'
              - 'Accept'
              - 'Origin'
            exposedHeaders:
              - 'Set-Cookie'
              - 'X-Total-Count'
            credentials: true
            preflightContinue: false
            optionsSuccessStatus: 204
            EOF
            
            # Service конфиг
            cat > configs/service.config.yml << 'EOF'
            port: 8000
            host: 0.0.0.0
            EOF
            
            # Environment файл
            cat > configs/.env << 'EOF'
            NODE_ENV=production
            DATABASE_HOST=database
            CACHE_HOST=redis
            KAFKA_BROKERS=['kafka1:29092']
            KAFKA_CONFIG_FILE_PATH=configs/kafka.config.yml
            CORS_CONFIG_FILE_PATH=configs/cors.config.yml
            SERVICE_CONFIG_FILE_PATH=configs/service.config.yml
            METRICS_AUTH_TOKEN=dev-token
            METRICS_CONFIG_FILE_PATH=configs/metrics.config.yml
            EOF
            
            # logger конфиг
            cat > configs/logger.config.yml << 'EOF'
            logLevel: DEBUG
            colors: true
            space: 0
            EOF

            # session-cooke конфиг
            cat > configs/session-cookie.config.yml << 'EOF'
            maxAge: 1000000000
            secure: false
            EOF

            # swagger конфиг
            cat > configs/swagger.config.yml << 'EOF'
            enabled: true
            swaggerPrefix: /swagger
            EOF

            # cache конфиг
            cat > configs/cache.config.yml << 'EOF'
            port: 6379
            host: ${CACHE_HOST}
            EOF

            #database конфиг
            cat > configs/database.config.yml << 'EOF'
            host: ${DATABASE_HOST}
            port: 5432
            username: username
            password: password
            database: database
            poolSize: 10
            ssl: false
            EOF

            # metrics конфиг
            cat > configs/metrics.config.yml << 'EOF'
            enabled: true
            path: /metrics
            authToken: ${METRICS_AUTH_TOKEN}
            EOF

            # Остановить текущие контейнеры
            docker-compose down
            
            # Получить новый образ backend'а
            docker-compose pull backend
            
            # Запустить базу данных и дождаться готовности
            docker-compose up -d database
            echo "Waiting for database to be ready..."
            sleep 30
            
            # Собрать и запустить миграции
            docker-compose pull db-migrations
            docker-compose up db-migrations
            echo "Migrations completed"
            
            # Запустить все остальные сервисы
            docker-compose up -d
            
            # Подождать немного для инициализации сервисов
            sleep 30
            
            # Показать статус
            docker-compose ps
            
            # Проверить логи backend'а
            echo "=== Backend logs ==="
            docker-compose logs --tail=20 backend
